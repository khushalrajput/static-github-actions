# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      # ----------------------------------------------------------
      # NOTIFY GOOGLE CHAT — SUCCESS
      # "if: success()" is a built-in GitHub condition.
      # This step ONLY runs if every previous step passed.
      # We use curl (a command line tool) to send an HTTP POST
      # request to your Google Chat webhook with a JSON payload.
      # ----------------------------------------------------------
      - name: Notify Google Chat on Success
        if: success()
        run: |
          curl -X POST '${{ secrets.GOOGLE_CHAT_WEBHOOK }}' \
          -H 'Content-Type: application/json' \
          -d '{
            "text": "✅ *Deployment Successful!* \n Your site is live on GitHub Pages. 🚀"
          }'

      # ----------------------------------------------------------
      # NOTIFY GOOGLE CHAT — FAILURE
      # "if: failure()" is the opposite — this ONLY runs if
      # any previous step failed. The deploy step failing won't
      # stop THIS step from running because of this condition.
      # ----------------------------------------------------------
      - name: Notify Google Chat on Failure
        if: failure()
        run: |
          curl -X POST '${{ secrets.GOOGLE_CHAT_WEBHOOK }}' \
          -H 'Content-Type: application/json' \
          -d '{
            "text": "❌ *Deployment Failed!* \n Something went wrong. Check the Actions tab. 🔍"
          }'

